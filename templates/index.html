<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Extractor V2.0</title>
    <style>
        :root { --bg: #0b0f19; --panel: #111827; --text: #00ffcc; --accent: #00ffcc; --danger: #ff3366; }
        body { font-family: 'Courier New', Courier, monospace; background-color: var(--bg); color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        .input-group { background: var(--panel); padding: 15px; border-left: 4px solid var(--accent); margin-bottom: 15px; }
        label { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        input[type="url"], input[type="text"], textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; box-sizing: border-box; font-family: monospace; }
        textarea { height: 120px; resize: vertical; }
        .divider { text-align: center; margin: 10px 0; color: #555; font-weight: bold; }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        button { display: flex; align-items: center; gap: 8px; background: var(--accent); color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 2px; }
        button:hover { opacity: 0.8; }
        #saveBtn { background: var(--danger); color: #fff; display: none; }
        .output-panel { margin-top: 20px; background: var(--panel); padding: 20px; display: none; border-top: 1px solid #333; }
        .category { color: var(--accent); margin-top: 20px; border-bottom: 1px dashed #333; padding-bottom: 5px; }
        .link-list { list-style: none; padding: 0; margin: 10px 0; word-break: break-all; font-size: 13px; color: #a1a1aa; }
        .link-list li { padding: 4px 0; border-bottom: 1px solid #1f2937; }
        .icon { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

<div class="container">
    <h2>[0xDATA_EXTRACTOR_V2]</h2>
    
    <div class="input-group">
        <label>
            <svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Target URL (Auto-Fetch)
        </label>
        <input type="url" id="urlInput" placeholder="https://example.com">
    </div>

    <div class="divider">--- OR ---</div>

    <div class="input-group">
        <label>
            <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            Raw HTML Paste
        </label>
        <textarea id="htmlInput" placeholder="Paste full HTML source code here..."></textarea>
    </div>

    <div class="input-group">
        <label>
            <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Custom Regex (Optional)
        </label>
        <input type="text" id="customRegex" placeholder="e.g., api/v1/.*?\.json">
    </div>
    
    <div class="controls">
        <button onclick="extractData()">
            <svg class="icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Execute Parse
        </button>
        <button id="saveBtn" onclick="saveToTxt()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Dump to TXT
        </button>
    </div>

    <div id="output" class="output-panel"></div>
</div>

<script>
    let rawOutputData = "";

    async function extractData() {
        const urlCode = document.getElementById('urlInput').value;
        const htmlCode = document.getElementById('htmlInput').value;
        const customRegex = document.getElementById('customRegex').value;
        
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = '<span style="color:var(--accent)">Running extraction protocol...</span>';
        outputDiv.style.display = 'block';

        const formData = new FormData();
        formData.append('url', urlCode);
        formData.append('html_code', htmlCode);
        formData.append('custom_regex', customRegex);

        try {
            const response = await fetch('/extract', { method: 'POST', body: formData });
            const data = await response.json();
            displayData(data);
        } catch (error) {
            outputDiv.innerHTML = `<span style="color:var(--danger)">System Error: ${error.message}</span>`;
        }
    }

    function displayData(data) {
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = '';
        rawOutputData = "=== 0xDATA ASSET DUMP ===\n\n";

        if (data.Error_Logs) {
            outputDiv.innerHTML = `<span style="color:var(--danger)">[!] ${data.Error_Logs[0]}</span>`;
            document.getElementById('saveBtn').style.display = 'none';
            return;
        }

        if (Object.keys(data).length === 0) {
            outputDiv.innerHTML = '<span>[!] Zero target assets found.</span>';
            document.getElementById('saveBtn').style.display = 'none';
            return;
        }

        for (const [category, links] of Object.entries(data)) {
            const catHeader = document.createElement('h3');
            catHeader.className = 'category';
            catHeader.textContent = `[+] ${category} (${links.length})`;
            outputDiv.appendChild(catHeader);

            const list = document.createElement('ul');
            list.className = 'link-list';
            
            rawOutputData += `--- ${category} ---\n`;

            links.forEach(link => {
                const li = document.createElement('li');
                li.textContent = link;
                list.appendChild(li);
                rawOutputData += `${link}\n`;
            });
            
            outputDiv.appendChild(list);
            rawOutputData += "\n";
        }

        document.getElementById('saveBtn').style.display = 'flex';
    }

    function saveToTxt() {
        const blob = new Blob([rawOutputData], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Data_Dump_${new Date().getTime()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
